db:
  uri: "mongodb://localhost:27017"
  database: "searchlab"

logic:
  workers: 4
  lock_seconds: 120
  seed_on_start: false
  seed_if_empty_only: false
  delay_between_requests: [0.1, 0.2]
  revisit_interval: 604800
  batch_size: 10
  http_timeout: 20
  idle_sleep_seconds: 3
  user_agent: "YV-SearchBot/1.0 (+lab crawler; contact: your_email@example.com)"

  arxiv_min_interval_seconds: 3.0
  geonames_min_interval_seconds: 0.25
  pubmed_min_interval_seconds: 0.34

seeding:
  max_urls_per_source: 35000

  geonames:
    dump_url: "https://download.geonames.org/export/dump/cities500.zip"
    countries: []          # например ["RS", "DE"], если хочешь ограничить страны
    feature_classes: ["P"] # populated places
    min_population: 0

  pubmed:
    term: "(journal article[pt] OR review[pt]) AND english[la]"
    year_from: 2018
    year_to: 2025
    batch_size: 500
    require_abstract: true
    tool: "searchlab_crawler"
    email: "your_email@example.com"

crawl:
  allowed_domains:
    - "sws.geonames.org"
    - "pubmed.ncbi.nlm.nih.gov"

export:
  out_dir: "./corpus_out"
  max_docs: null